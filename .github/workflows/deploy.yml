name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start server and build static files
        run: |
          node server.js &
          sleep 8
          curl -f http://localhost:3000 > /dev/null || (echo "Server failed to start" && exit 1)
          mkdir -p dist
          wget --mirror --convert-links --adjust-extension --no-host-directories --page-requisites -P dist http://localhost:3000
          test -f dist/index.html || (echo "index.html not found in dist!" && exit 1)
          kill %1

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOSTNAME }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
