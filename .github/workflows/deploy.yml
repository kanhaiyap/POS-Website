name: Deploy to Hostinger

on:
  push:
    branches:
      - development

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start server and build static files
        run: |
          node server.js &
          sleep 5
          mkdir -p dist
          wget --mirror --convert-links --adjust-extension --no-host-directories --page-requisites -P dist http://localhost:3000
          kill %1

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOSTNAME }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /domains/aarohitavigyan.com/public_html/
          exclude: |
            **/.git*
            **/.git*/**
